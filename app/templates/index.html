<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcription Audio - Whisper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #C41E3A 0%, #8B1538 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
            position: relative;
        }

        .logo-ensae {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 120px;
            height: auto;
            z-index: 10;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        .drop-zone {
            border: 3px dashed #C41E3A;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fff5f7;
        }

        .drop-zone:hover, .drop-zone.dragover {
            background: #ffe5eb;
            border-color: #8B1538;
            transform: scale(1.02);
        }

        .drop-zone-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .drop-zone-text {
            color: #C41E3A;
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .drop-zone-hint {
            color: #999;
            font-size: 0.9em;
        }

        #fileInput {
            display: none;
        }

        .file-info {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }

        .file-info.active {
            display: block;
        }

        .btn {
            background: linear-gradient(135deg, #C41E3A 0%, #8B1538 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 20px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(196, 30, 58, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #C41E3A;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result {
            background: #fff5f7;
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
            display: none;
            border-left: 5px solid #C41E3A;
        }

        .result.active {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-title {
            color: #C41E3A;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .result-text {
            color: #333;
            line-height: 1.6;
            font-size: 1.1em;
            word-wrap: break-word;
        }

        .result-meta {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
            color: #666;
            font-size: 0.9em;
        }

        .error {
            background: #ffe0e0;
            color: #d00;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            border-left: 5px solid #d00;
        }

        .error.active {
            display: block;
        }

        .diarization {
            background: #fff4e6;
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
            display: none;
            border-left: 5px solid #ff9800;
        }

        .diarization.active {
            display: block;
            animation: slideIn 0.5s ease;
        }

        .diarization-title {
            color: #ff9800;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .speaker-segment {
            background: white;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #ff9800;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.2s ease;
        }

        .speaker-segment:hover {
            transform: translateX(5px);
            box-shadow: 0 2px 8px rgba(255, 152, 0, 0.2);
        }

        .speaker-badge {
            background: #ff9800;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9em;
            min-width: 80px;
            text-align: center;
        }

        .speaker-time {
            color: #666;
            font-size: 0.9em;
            font-family: 'Courier New', monospace;
        }

        .no-diarization {
            color: #999;
            font-style: italic;
            text-align: center;
            padding: 20px;
        }

        .speaker-highlight {
            padding: 2px 4px;
            border-radius: 3px;
            font-weight: 500;
        }

        .speaker-0 { background-color: #ffebee; }
        .speaker-1 { background-color: #e3f2fd; }
        .speaker-2 { background-color: #e8f5e9; }
        .speaker-3 { background-color: #fff3e0; }
        .speaker-4 { background-color: #f3e5f5; }
        .speaker-5 { background-color: #e0f2f1; }
        .speaker-6 { background-color: #fce4ec; }
        .speaker-7 { background-color: #e8eaf6; }
    </style>
</head>
<body>
    <div class="container">
        <img src="/images/LOGO-ENSAE.png" alt="Logo ENSAE" class="logo-ensae">
        <h1> Transcription Audio</h1>
        <p class="subtitle">Convertissez vos fichiers audio en texte avec Whisper AI</p>

        <div class="drop-zone" id="dropZone">
            <div class="drop-zone-icon">📁</div>
            <div class="drop-zone-text">Glissez-déposez un fichier audio ici</div>
            <div class="drop-zone-hint">ou cliquez pour sélectionner (WAV, MP3)</div>
        </div>

        <input type="file" id="fileInput" accept=".wav,.mp3" />

        <div class="file-info" id="fileInfo">
            <strong>Fichier sélectionné :</strong> <span id="fileName"></span>
        </div>

        <button class="btn" id="transcribeBtn" disabled>Transcrire</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Transcription en cours...</p>
        </div>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <div class="result-title"> Transcription</div>
            <div class="result-text" id="resultText"></div>
            <div class="result-meta">
                <strong>Fichier :</strong> <span id="resultFile"></span><br>
                <strong>Langue détectée :</strong> <span id="resultLang"></span>
            </div>
        </div>

        <div class="diarization" id="diarization">
            <div class="diarization-title"> Diarisation des locuteurs</div>
            <div id="diarizationContent"></div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const transcribeBtn = document.getElementById('transcribeBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const error = document.getElementById('error');
        const resultText = document.getElementById('resultText');
        const resultFile = document.getElementById('resultFile');
        const resultLang = document.getElementById('resultLang');
        const diarization = document.getElementById('diarization');
        const diarizationContent = document.getElementById('diarizationContent');

        let selectedFile = null;

        // Click sur la zone de drop
        dropZone.addEventListener('click', () => fileInput.click());

        // Drag and drop events
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        // Sélection de fichier
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            const validTypes = ['audio/wav', 'audio/mpeg', 'audio/mp3'];
            const validExtensions = ['.wav', '.mp3'];
            const fileExtension = '.' + file.name.split('.').pop().toLowerCase();

            if (!validExtensions.includes(fileExtension)) {
                showError('Format non supporté. Utilisez WAV ou MP3.');
                return;
            }

            selectedFile = file;
            fileName.textContent = file.name;
            fileInfo.classList.add('active');
            transcribeBtn.disabled = false;
            result.classList.remove('active');
            diarization.classList.remove('active');
            error.classList.remove('active');
        }

        // Transcription
        transcribeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('audio_file', selectedFile);

            transcribeBtn.disabled = true;
            loading.classList.add('active');
            result.classList.remove('active');
            diarization.classList.remove('active');
            error.classList.remove('active');

            try {
                const response = await fetch('/transcribe', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Erreur lors de la transcription');
                }

                // Afficher les résultats
                resultFile.textContent = data.filename;
                resultLang.textContent = data.language.toUpperCase();

                // Afficher la diarisation si disponible
                if (data.diarization && data.diarization.length > 0) {
                    // Afficher le texte avec surlignage par speaker
                    displayHighlightedText(data.diarization);
                    displayDiarization(data.diarization);
                    diarization.classList.add('active');
                } else {
                    // Sans diarisation, afficher le texte normal
                    resultText.textContent = data.text;
                    diarizationContent.innerHTML = '<div class="no-diarization">Diarisation non disponible</div>';
                    diarization.classList.add('active');
                }

                result.classList.add('active');

            } catch (err) {
                showError(err.message);
            } finally {
                loading.classList.remove('active');
                transcribeBtn.disabled = false;
            }
        });

        function displayHighlightedText(segments) {
            // Créer un mapping des speakers vers des indices de couleur
            const speakerMap = {};
            let colorIndex = 0;
            segments.forEach(seg => {
                if (!speakerMap[seg.speaker]) {
                    speakerMap[seg.speaker] = colorIndex % 8;
                    colorIndex++;
                }
            });

            // Construire le texte surligné
            let highlightedHTML = '';
            segments.forEach(segment => {
                if (segment.text) {
                    const colorClass = `speaker-${speakerMap[segment.speaker]}`;
                    highlightedHTML += `<span class="speaker-highlight ${colorClass}">${segment.text}</span> `;
                }
            });

            resultText.innerHTML = highlightedHTML || 'Aucun texte détecté';
        }

        function displayDiarization(segments) {
            // Créer un mapping des speakers vers des indices de couleur
            const speakerMap = {};
            let colorIndex = 0;
            segments.forEach(seg => {
                if (!speakerMap[seg.speaker]) {
                    speakerMap[seg.speaker] = colorIndex % 8;
                    colorIndex++;
                }
            });

            let html = '';
            segments.forEach(segment => {
                const duration = segment.end - segment.start;
                const colorClass = `speaker-${speakerMap[segment.speaker]}`;
                const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--speaker-color') || '#ff9800';

                html += `
                    <div class="speaker-segment">
                        <div class="speaker-badge" style="background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);">${segment.speaker}</div>
                        <div style="flex: 1;">
                            <div class="speaker-time">
                                ${formatTime(segment.start)} → ${formatTime(segment.end)}
                                (${duration.toFixed(1)}s)
                            </div>
                            ${segment.text ? `<div style="margin-top: 8px; color: #333;" class="${colorClass}">${segment.text}</div>` : ''}
                        </div>
                    </div>
                `;
            });
            diarizationContent.innerHTML = html;
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function showError(message) {
            error.textContent = message;
            error.classList.add('active');
            setTimeout(() => {
                error.classList.remove('active');
            }, 5000);
        }
    </script>
</body>
</html>
